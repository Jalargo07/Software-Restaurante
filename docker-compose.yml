services:
  backend:
    build: ./back
    container_name: restaurant-backend
    ports:
      - "3000:3000"
    volumes:
      - sqlite-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PORT=3000
      - JWT_SECRET=restaurant_secret_key_2026
      - CORS_ORIGIN=http://localhost
      - S3_ENDPOINT=http://host.docker.internal:9000
      - S3_REGION=us-east-1
      - S3_ACCESS_KEY=alejoadmin
      - S3_SECRET_KEY=alejo1234
      - S3_BUCKET_NAME=restaurante-bucket

  frontend:
    build: ./front
    container_name: restaurant-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  sqlite-data:
