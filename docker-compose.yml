services:
  postgres:
    image: postgres:15-alpine
    container_name: restaurant-postgres
    environment:
      POSTGRES_DB: restaurant_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d restaurant_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: restaurant-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redisdata:/data

  backend:
    build: ./back
    container_name: restaurant-backend
    ports:
      - "3000:3000"
    volumes:
      - sqlite-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PORT=3000
      - JWT_SECRET=restaurant_secret_key_2026
      - CORS_ORIGIN=http://localhost
      - DB_DIALECT=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=restaurant_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - S3_ENDPOINT=http://host.docker.internal:9000
      - S3_REGION=us-east-1
      - S3_ACCESS_KEY=alejoadmin
      - S3_SECRET_KEY=alejo1234
      - S3_BUCKET_NAME=restaurante-bucket
      - REDIS_URL=redis://redis:6379

  frontend:
    build: ./front
    container_name: restaurant-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  sqlite-data:
  pgdata:
  redisdata:
